openapi: 3.0.3
info:
  title: Interledger Issuer API
  version: 0.1.0
  description: |
    To be written

tags:
  - name: CardManagement
    description: Operations for managing the lifecycle of a card, such as locking, unlocking, and deleting.

paths:
  /v1/card/{cardId}/lock:
    post:
      summary: Lock a card
      operationId: lockCard
      tags:
        - CardManagement
      parameters:
        - name: cardId
          in: path
          required: true
          description: The unique identifier of the card to lock
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockCardRequest'
      responses:
        '204':
          description: Card locked successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/card/{cardId}/unlock:
    post:
      summary: Unlock a card
      operationId: unlockCard
      tags:
        - CardManagement
      parameters:
        - name: cardId
          in: path
          required: true
          description: The unique identifier of the card to unlock
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockCardRequest'
      responses:
        '204':
          description: Card unlocked successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/card/{cardId}:
    delete:
      summary: Delete a card
      operationId: deleteCard
      tags:
        - CardManagement
      parameters:
        - name: cardId
          in: path
          required: true
          description: The unique identifier of the card to delete
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCardRequest'
      responses:
        '204':
          description: Card deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    LockCardRequest:
      type: object
      additionalProperties: false
      properties:
        actor:
          type: string
          enum:
            - USER
            - ISSUER
          description: The actor that performed the lock
        reason:
          type: string
          description: Human-readable reason for locking the card
      required:
        - actor
        - reason

    UnlockCardRequest:
      type: object
      additionalProperties: false
      properties:
        actor:
          type: string
          enum:
            - USER
            - ISSUER
          description: The actor that performed the unlock
        reason:
          type: string
          description: Optional human-readable reason for unlocking the card
      required:
        - actor

    DeleteCardRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Human-readable reason for deleting the card
      required:
        - reason

    Problem:
      type: object
      description: |
        Error representation following [RFC 7807 - Problem Details for
        HTTP APIs](https://www.rfc-editor.org/rfc/rfc7807).

        Returned for all non-2xx responses with the
        `application/problem+json` media type. Clients should use `status`
        and `title` for programmatic handling and surface `detail` for
        diagnostics. The `instance` field carries the server-assigned
        request correlation ID and should be quoted when reporting issues.
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          description: |
            URI reference identifying the problem type. Defaults to
            `about:blank`, which means the problem has no additional
            semantics beyond `title` and `status`.
          default: about:blank
          example: about:blank
        title:
          type: string
          description: |
            Short, human-readable summary of the problem type. For
            `about:blank`, this is the standard HTTP reason phrase for
            `status` (e.g. `Bad Request`, `Not Found`).
          example: Bad Request
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code generated by the origin server for this occurrence.
          example: 400
        detail:
          type: string
          description: |
            Human-readable explanation specific to this occurrence of the
            problem. Safe to log; not intended for end-user display.
          example: invalid country code
        instance:
          type: string
          description: |
            Server-assigned correlation identifier for this request
            (the request ID). Include it when contacting support to
            enable log lookups.
          example: 07cf97fa-7c93-4d22-8ad5-eba4116672e6

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
