openapi: 3.0.3
info:
  title: Interledger Issuer API
  version: 0.1.0
  description: |
    To be written


paths:
  /v1/authorize:
    post:
      summary: Authorize a payment
      operationId: authorizePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeRequest'
      responses:
        '200':
          description: Payment authorized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    AuthorizeRequest:
      type: object
      additionalProperties: false
      properties:
        tlvPayload:
          type: string
          x-oapi-codegen-extra-tags:
            sensitive: crypto_data
          description: The TLV payload for the authorization request
        pinBlock:
          type: string
          x-oapi-codegen-extra-tags:
            sensitive: credential
          description: The PIN block for the authorization request
      required:
        - tlvPayload

    AuthorizeResponse:
      type: object
      additionalProperties: false
      properties:
        authorizationId:
          type: string
          description: The unique identifier for the authorized payment
        status:
          type: string
          description: The status of the authorization (e.g., "authorized", "declined")
      required:
        - authorizationId
        - status

    Problem:
      type: object
      description: |
        Error representation following [RFC 7807 - Problem Details for
        HTTP APIs](https://www.rfc-editor.org/rfc/rfc7807).

        Returned for all non-2xx responses with the
        `application/problem+json` media type. Clients should use `status`
        and `title` for programmatic handling and surface `detail` for
        diagnostics. The `instance` field carries the server-assigned
        request correlation ID and should be quoted when reporting issues.
      required:
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
          description: |
            URI reference identifying the problem type. Defaults to
            `about:blank`, which means the problem has no additional
            semantics beyond `title` and `status`.
          default: about:blank
          example: about:blank
        title:
          type: string
          description: |
            Short, human-readable summary of the problem type. For
            `about:blank`, this is the standard HTTP reason phrase for
            `status` (e.g. `Bad Request`, `Not Found`).
          example: Bad Request
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP status code generated by the origin server for this occurrence.
          example: 400
        detail:
          type: string
          description: |
            Human-readable explanation specific to this occurrence of the
            problem. Safe to log; not intended for end-user display.
          example: invalid country code
        instance:
          type: string
          description: |
            Server-assigned correlation identifier for this request
            (the request ID). Include it when contacting support to
            enable log lookups.
          example: 07cf97fa-7c93-4d22-8ad5-eba4116672e6

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
